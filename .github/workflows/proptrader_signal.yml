name: PropTrader Signal Engine

on:
  schedule:
    # Every 4H on weekdays (Mon-Fri) at bar close times UTC
    # 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '5 0,4,8,12,16,20 * * 1-5'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: proptrader-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run signal engine
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: python proptrader_signal.py

      - name: Commit state (rebase loop)
        env:
          GIT_MERGE_AUTOEDIT: no
        run: |
          git config user.name  "PropTrader-Bot"
          git config user.email "proptrader@github-actions"

          git add paper_positions.json
          git add paper_trade_log.csv
          git add proptrader_dashboard.json

          if git diff --staged --quiet; then
            echo "No changes this bar."
            exit 0
          fi

          git commit -m "PropTrader signal $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Rebase loop — handles concurrent runs safely
          for i in 1 2 3 4 5 6 7 8; do
            if git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected. Rebasing... (attempt $i)"
            git pull --rebase -X ours origin main || git rebase --abort
            git add paper_positions.json paper_trade_log.csv proptrader_dashboard.json
            git commit --amend --no-edit --allow-empty || true
            sleep $((RANDOM % 6 + 2))
          done

          echo "Failed after 8 attempts. Will retry next bar."
          exit 0
